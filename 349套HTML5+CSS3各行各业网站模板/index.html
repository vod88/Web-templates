<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>349套HTML5+CSS3行业网站模板</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f0f0f; color: #fff; }
    .header { position: sticky; top: 0; z-index: 10; background: #1a1a1a; padding: 16px 20px; border-bottom: 1px solid #333; }
    .header h1 { font-size: 20px; margin-bottom: 12px; }
    .header input { width: 100%; padding: 12px; background: #2a2a2a; border: 1px solid #444; border-radius: 6px; color: #fff; font-size: 14px; }
    .header input:focus { outline: none; border-color: #4ea1ff; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; padding: 20px; }
    .card { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; overflow: hidden; cursor: pointer; transition: .2s; text-decoration: none; color: inherit; display: block; }
    .card:hover { border-color: #4ea1ff; transform: translateY(-3px); box-shadow: 0 4px 20px rgba(78,161,255,.2); }
    .thumb { width: 100%; aspect-ratio: 16/10; background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 100%); display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 8px; }
    .thumb .num { font-size: 32px; font-weight: 700; color: #4ea1ff; }
    .thumb .text { font-size: 12px; color: #666; }
    .card-bottom { padding: 12px; font-size: 14px; color: #aaa; text-align: center; }
    .hide { display: none !important; }
    .count { padding: 0 20px 10px; font-size: 13px; color: #666; }
    .footer { text-align: center; padding: 40px 20px; color: #555; font-size: 12px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>349套 HTML5+CSS3 行业模板</h1>
    <input type="text" id="search" placeholder="输入编号搜索，如 001、088、256">
  </div>
  <div class="count">共 <span id="count">349</span> 套模板，点击卡片新窗口预览</div>
  <div class="grid" id="grid"></div>
  <div class="footer">Powered by Cloudflare Pages</div>

  <script>
    // 文件夹名就是你截图里的完整名字
    const baseDir = '349套HTML5+CSS3各行各业网站模板'; 
    const total = 349;
    const grid = document.getElementById('grid');
    const countEl = document.getElementById('count');
    
    for (let i = 1; i <= total; i++) {
      const num = String(i).padStart(3, '0'); // 001, 002...349
      const path = `${baseDir}/${num}/`;
      const encodedPath = encodeURI(path); // 处理中文和+号
      
      const card = document.createElement('a');
      card.className = 'card';
      card.href = encodedPath;
      card.target = '_blank';
      card.dataset.id = num;
      card.innerHTML = `
        <div class="thumb">
          <div class="num">${num}</div>
          <div class="text">点击预览</div>
        </div>
        <div class="card-bottom">模板 ${num}</div>
      `;
      grid.appendChild(card);
    }

    // 搜索功能
    document.getElementById('search').addEventListener('input', (e) => {
      const val = e.target.value.trim();
      let showCount = 0;
      document.querySelectorAll('.card').forEach(card => {
        const show = val === '' || card.dataset.id.includes(val);
        card.classList.toggle('hide', !show);
        if (show) showCount++;
      });
      countEl.textContent = showCount;
    });
  </script>
</body>
</html>
