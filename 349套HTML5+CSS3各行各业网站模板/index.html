<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>349套HTML5+CSS3行业网站模板 - 在线预览</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f0f0f; color: #fff; }
    .header { position: sticky; top: 0; z-index: 10; background: #1a1a1a; padding: 16px 20px; border-bottom: 1px solid #333; }
    .header h1 { font-size: 20px; margin-bottom: 8px; }
    .header input { width: 100%; padding: 10px; background: #2a2a2a; border: 1px solid #444; border-radius: 6px; color: #fff; font-size: 14px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 16px; padding: 20px; }
    .card { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; overflow: hidden; transition: .2s; }
    .card:hover { border-color: #555; transform: translateY(-2px); }
    .card-top { padding: 10px 12px; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
    .card-top span { color: #aaa; }
    .card-top a { color: #4ea1ff; text-decoration: none; font-size: 12px; }
    .iframe-wrap { position: relative; width: 100%; aspect-ratio: 16/10; background: #2a2a2a; }
    .iframe-wrap::before { 
      content: '点击加载预览'; position: absolute; inset: 0; display: flex; 
      align-items: center; justify-content: center; color: #666; font-size: 14px; cursor: pointer;
    }
    .iframe-wrap.loaded::before { display: none; }
    iframe { width: 100%; height: 100%; border: none; background: #fff; }
    .hide { display: none !important; }
  </style>
</head>
<body>
  <div class="header">
    <h1>349套 HTML5+CSS3 行业模板在线预览</h1>
    <input type="text" id="search" placeholder="输入编号搜索，如 001 或 088">
  </div>
  
  <div class="grid" id="grid"></div>

  <script>
    const baseDir = '349套HTML5+CSS3各行各业网站模板';
    const total = 349;
    const grid = document.getElementById('grid');
    
    // 1. 先生成349个卡片DOM，但iframe不加载
    for (let i = 1; i <= total; i++) {
      const num = String(i).padStart(3, '0'); // 001 002...349
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.id = num;
      card.innerHTML = `
        <div class="card-top">
          <span>模板 ${num}</span>
          <a href="${baseDir}/${num}/" target="_blank">新窗口打开 ↗</a>
        </div>
        <div class="iframe-wrap" data-src="${baseDir}/${num}/">
        </div>
      `;
      grid.appendChild(card);
    }

    // 2. 点击或滚动到时才加载iframe，避免349个同时请求卡死
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          loadIframe(entry.target);
          observer.unobserve(entry.target);
        }
      });
    }, { rootMargin: '200px' }); // 提前200px加载

    function loadIframe(wrap) {
      if (wrap.classList.contains('loaded')) return;
      const iframe = document.createElement('iframe');
      iframe.loading = 'lazy';
      iframe.src = wrap.dataset.src;
      wrap.appendChild(iframe);
      wrap.classList.add('loaded');
    }

    // 所有iframe-wrap都观察 + 点击也能加载
    document.querySelectorAll('.iframe-wrap').forEach(wrap => {
      observer.observe(wrap);
      wrap.addEventListener('click', () => loadIframe(wrap));
    });

    // 3. 搜索功能
    document.getElementById('search').addEventListener('input', (e) => {
      const val = e.target.value.trim();
      document.querySelectorAll('.card').forEach(card => {
        if (val === '' || card.dataset.id.includes(val)) {
          card.classList.remove('hide');
        } else {
          card.classList.add('hide');
        }
      });
    });
  </script>
</body>
</html>
